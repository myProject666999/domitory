<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>宿舍管理系统 - 登录</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/layui@2.8.17/dist/css/layui.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 400px;
        }
        .login-title {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        .login-title h2 {
            margin: 0;
            font-size: 24px;
            font-weight: 600;
        }
        .login-title p {
            margin: 10px 0 0 0;
            color: #999;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-title">
            <h2>宿舍管理系统</h2>
            <p>Dormitory Management System</p>
        </div>
        <form class="layui-form" id="loginForm">
            <div class="layui-form-item">
                <label class="layui-form-label">用户名</label>
                <div class="layui-input-block">
                    <input type="text" name="username" lay-verify="required" placeholder="请输入用户名" autocomplete="off" class="layui-input">
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">密码</label>
                <div class="layui-input-block">
                    <input type="password" name="password" lay-verify="required" placeholder="请输入密码" autocomplete="off" class="layui-input">
                </div>
            </div>
            <div class="layui-form-item">
                <div class="layui-input-block">
                    <button class="layui-btn layui-btn-fluid layui-btn-normal" lay-submit lay-filter="login">登 录</button>
                </div>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/layui@2.8.17/dist/layui.js"></script>
    <script>
        layui.use(['form', 'layer'], function(){
            var form = layui.form;
            var layer = layui.layer;
            var $ = layui.$;
            
            form.on('submit(login)', function(data){
                $.ajax({
                    url: '/api/login',
                    type: 'POST',
                    data: data.field,
                    success: function(res){
                        if(res.code === 0){
                            layer.msg('登录成功', {icon: 1}, function(){
                                window.location.href = '/';
                            });
                        } else {
                            layer.msg(res.message, {icon: 2});
                        }
                    },
                    error: function(xhr){
                        var res = JSON.parse(xhr.responseText);
                        layer.msg(res.message || '登录失败', {icon: 2});
                    }
                });
                return false;
            });
        });
    </script>
</body>
</html>
